---
- name: Check existence of WordPress systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ wordpress_identifier }}.service"
  register: wordpress_service_stat

- name: Uninstall WordPress systemd services and files
  when: wordpress_service_stat.stat.exists | bool
  block:
    - name: Ensure WordPress systemd service is stopped
      ansible.builtin.service:
        name: "{{ wordpress_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure WordPress systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ wordpress_identifier }}.service"
        state: absent

    - name: Ensure WordPress support files do not exist
      ansible.builtin.file:
        path: "{{ wordpress_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels
        - uploads.ini

    - name: Ensure WordPress image source files path does not exist
      ansible.builtin.file:
        path: "{{ wordpress_container_image_self_build_src_files_path }}"
        state: absent

    - name: Ensure WordPress local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ wordpress_data_path }}"
      register: wordpress_data_path_deletion_result
      changed_when: wordpress_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure WordPress base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ wordpress_base_path }}"
      register: wordpress_base_path_deletion_result
      changed_when: wordpress_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure WordPress container network does not exist
      when: wordpress_container_network_deletion_enabled
      block:
        - name: Ensure WordPress container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ wordpress_container_network }}"
            state: absent
          register: wordpress_network_deletion_result

        - name: Ensure WordPress container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ wordpress_container_network }}
          register: wordpress_network_deletion_result
          changed_when: wordpress_container_network in wordpress_network_deletion_result.stdout

- name: Check existence of WordPress local data path
  ansible.builtin.stat:
    path: "{{ wordpress_data_path }}"
  register: wordpress_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Notify if WordPress local data remains
  when: wordpress_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local WordPress instance has been removed, some old data remains in `" + wordpress_data_path + "`. Feel free to delete it."
        ]
      }}
